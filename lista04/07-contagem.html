<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    maior(maior que 1): <input id="ipt_numero" type="text"><br>
    divisor(3-10): <input id="ipt_divisor" type="text"><br>
    <button onclick="divisivel()">Contar</button><br>
    <div id="div_msg"></div>
</body>
</body>
</html>
<script>
    function divisivel(){
        let maior = Number(ipt_numero.value);
        let divisor = Number(ipt_divisor.value);
        let qtd = 0;
        let contador = 1;
        while(contador <= maior){
            if(contador % divisor == 0){
                div_msg.innerHTML += `${contador}, `
                qtd = qtd + 1;
            }
            else{
                div_msg.innerHTML += ``
            }
            contador = contador + 1;
        } 
        div_msg.innerHTML += `
        <br> QUANTIDADE TOTAL DE MULTIPLOS: ${qtd}`
    }
</script>
</body>
</html>
