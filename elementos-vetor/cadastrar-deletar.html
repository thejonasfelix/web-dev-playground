<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar e Deletar elementos do vetor</title>
</head>
<body>
    <h3>Cadastrar e Deletar Elementos do Vetor</h3>
    nome da fruta: <input id="ipt_nome_fruta" type="text"><br>
    fruta que deseja excluir: <input id="ipt_nome_exclusao" type="text">
    <button onclick="cadastrar()">Cadastrar</button>
    <button onclick="deletar()">Deletar</button>
    <div id="div_msg"></div>
</body>
</html>
<script>
    vt_frutas = []
    function cadastrar(){
        let nome_fruta = ipt_nome_fruta.value
        vt_frutas.push(nome_fruta)
        div_msg.innerHTML = `<br>${vt_frutas}`
        ipt_nome_fruta.value = `` 
    }
    function deletar(){
        var nome_exclusão = ipt_nome_exclusao.value
        for(var i = 0; i < vt_frutas.length; i++){
            if(vt_frutas[i] == nome_exclusão){
                vt_frutas.splice(i,1);
                div_msg.innerHTML = `<br>${vt_frutas}`
            }
        }
        ipt_nome_exclusao.value = ``
    }
</script>
